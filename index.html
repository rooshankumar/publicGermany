    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#2C3E50" />

    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var hour = new Date().getHours();
          var inNight = hour >= 19 || hour < 5; // 19:00 - 05:00
          // Support modes: 'light' | 'dark' | 'auto'
          var shouldDark = false;
          if (stored === 'dark') shouldDark = true;
          else if (stored === 'light') shouldDark = false;
          else if (stored === 'auto') shouldDark = inNight;
          else shouldDark = prefersDark; // first visit fallback
          if (shouldDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {
          // In case of any errors (e.g., blocked storage), fall back to system preference
          if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        }
      })();
    </script>
